{% extends "base.html" %}

{% block title %}Диаграммы{% endblock %}

{% block extra_css %}
<link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
    .diagram-card {
        transition: transform 0.2s;
        border-radius: 12px;
        overflow: hidden;
    }
    .diagram-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .diagram-preview {
        background: #f8f9fa;
        padding: 15px;
        border-radius: 8px;
        text-align: center;
        min-height: 200px;
    }
    .diagram-preview svg {
        max-width: 100%;
        height: auto;
    }
    pre {
        background: #1e1e1e;
        padding: 15px;
        border-radius: 8px;
        overflow-x: auto;
    }
    .modal-body .diagram-container {
        min-height: 400px;
    }
    .diagram-container svg {
        max-width: 100%;
        height: auto;
    }
    .diagram-preview-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 150px;
    }
</style>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="fas fa-project-diagram"></i> Диаграммы</h1>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#diagramModal" onclick="resetDiagramForm()">
        <i class="fas fa-plus"></i> Создать диаграмму
    </button>
</div>

<div id="diagramsList" class="row">
    <div class="col-12 text-center">
        <div class="spinner-border" role="status">
            <span class="visually-hidden">Загрузка...</span>
        </div>
    </div>
</div>

<!-- Modal для создания/редактирования диаграммы -->
<div class="modal fade" id="diagramModal" tabindex="-1">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Создать диаграмму</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="diagramForm">
                    <input type="hidden" id="diagramId">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Название *</label>
                                <input type="text" class="form-control" id="title" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Тип</label>
                                <select class="form-control" id="diagramType">
                                    <option value="mermaid">Mermaid</option>
                                    <option value="plantuml">PlantUML</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Описание</label>
                        <textarea class="form-control" id="description" rows="2"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Код диаграммы *</label>
                        <textarea class="form-control font-monospace" id="content" rows="10" placeholder="sequenceDiagram&#10;    Alice->>John: Hello John!&#10;    John-->>Alice: Great!"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Предпросмотр</label>
                        <div id="preview" class="diagram-preview border bg-light">
                            <div class="diagram-preview-loading text-muted">
                                <i class="fas fa-info-circle"></i> Введите код диаграммы для предпросмотра
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-primary" onclick="saveDiagram()">Сохранить</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal для просмотра диаграммы -->
<div class="modal fade" id="viewDiagramModal" tabindex="-1">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="viewTitle"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p id="viewDescription" class="text-muted"></p>
                <div id="viewContent" class="diagram-container bg-light p-3 rounded"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
            </div>
        </div>
    </div>
</div>

<script>
// Инициализация Mermaid
function initMermaid() {
    if (typeof mermaid !== 'undefined') {
        mermaid.initialize({
            startOnLoad: false,
            theme: 'default',
            securityLevel: 'loose',
            flowchart: { useMaxWidth: true, htmlLabels: true },
            sequence: { useMaxWidth: true, diagramMarginX: 50, diagramMarginY: 10 },
            gantt: { useMaxWidth: true, titleTopMargin: 25, barHeight: 20, barGap: 4 },
            journey: { useMaxWidth: true }
        });
    }
}
initMermaid();

// Функция рендеринга диаграммы
async function renderDiagram(content, containerId) {
    const container = document.getElementById(containerId);
    if (!container) {
        console.error('Container not found:', containerId);
        return false;
    }

    if (!content || content.trim() === '') {
        container.innerHTML = '<div class="text-muted text-center p-3">Нет содержимого для отображения</div>';
        return false;
    }

    try {
        container.innerHTML = '<div class="diagram-preview-loading text-center p-3"><i class="fas fa-spinner fa-spin me-2"></i> Рендеринг диаграммы...</div>';

        // Очищаем старый SVG если есть
        const oldSvg = container.querySelector('svg');
        if (oldSvg) oldSvg.remove();

        // Создаем временный контейнер для рендеринга
        const tempId = 'temp-mermaid-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
        const wrapper = document.createElement('div');
        wrapper.id = tempId;
        wrapper.style.position = 'absolute';
        wrapper.style.left = '-9999px';
        wrapper.style.top = '-9999px';
        document.body.appendChild(wrapper);

        const pre = document.createElement('pre');
        pre.className = 'mermaid';
        pre.textContent = content;
        wrapper.appendChild(pre);

        // Рендерим
        await mermaid.run({
            nodes: [pre],
            suppressErrors: true
        });

        const svg = pre.querySelector('svg');
        if (svg) {
            container.innerHTML = '';
            const clonedSvg = svg.cloneNode(true);
            // Добавляем стили для адаптивности
            clonedSvg.style.maxWidth = '100%';
            clonedSvg.style.height = 'auto';
            container.appendChild(clonedSvg);
            document.body.removeChild(wrapper);
            return true;
        } else {
            container.innerHTML = `<pre class="bg-light p-3 rounded"><code class="language-mermaid">${escapeHtml(content)}</code></pre>`;
            document.body.removeChild(wrapper);
            return false;
        }
    } catch (err) {
        console.error('Render error:', err);
        container.innerHTML = `<div class="alert alert-warning">Ошибка рендеринга: ${err.message}<br><pre class="mt-2 small">${escapeHtml(content)}</pre></div>`;
        return false;
    }
}

// Загрузка списка диаграмм
async function loadDiagrams() {
    try {
        const response = await fetch('/api/diagrams/', { credentials: 'include' });
        if (response.ok) {
            const diagrams = await response.json();
            await displayDiagrams(diagrams);
        } else if (response.status === 401) {
            window.location.href = '/login';
        }
    } catch (error) {
        console.error('Error loading diagrams:', error);
        document.getElementById('diagramsList').innerHTML = `
            <div class="col-12">
                <div class="alert alert-danger">Ошибка загрузки: ${error.message}</div>
            </div>
        `;
    }
}

async function displayDiagrams(diagrams) {
    const container = document.getElementById('diagramsList');

    if (!diagrams || diagrams.length === 0) {
        container.innerHTML = `
            <div class="col-12">
                <div class="alert alert-info text-center">
                    <i class="fas fa-info-circle"></i> Нет диаграмм. Создайте первую!
                </div>
            </div>
        `;
        return;
    }

    container.innerHTML = diagrams.map(diagram => `
        <div class="col-md-6 col-lg-4 mb-3">
            <div class="card diagram-card h-100">
                <div class="card-body">
                    <span class="badge bg-primary mb-2">${escapeHtml(diagram.diagram_type)}</span>
                    <h5 class="card-title">${escapeHtml(diagram.title)}</h5>
                    <div id="preview-${diagram.id}" class="diagram-preview" style="min-height: 150px;">
                        <div class="diagram-preview-loading text-center p-3">
                            <i class="fas fa-spinner fa-spin"></i> Загрузка...
                        </div>
                    </div>
                    ${diagram.description ? `<p class="card-text small text-muted mt-2">${escapeHtml(diagram.description)}</p>` : ''}
                </div>
                <div class="card-footer bg-transparent">
                    <div class="btn-group w-100">
                        <button class="btn btn-sm btn-info" onclick="viewDiagram(${diagram.id})">
                            <i class="fas fa-eye"></i> Просмотр
                        </button>
                        <button class="btn btn-sm btn-warning" onclick="editDiagram(${diagram.id})">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="deleteDiagram(${diagram.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    `).join('');

    // Рендерим каждую диаграмму
    for (const diagram of diagrams) {
        await renderDiagram(diagram.content, `preview-${diagram.id}`);
    }
}

async function viewDiagram(id) {
    try {
        const response = await fetch(`/api/diagrams/${id}`, { credentials: 'include' });
        if (response.ok) {
            const diagram = await response.json();
            document.getElementById('viewTitle').textContent = diagram.title;
            document.getElementById('viewDescription').textContent = diagram.description || '';

            const modal = new bootstrap.Modal(document.getElementById('viewDiagramModal'));
            modal.show();

            // Рендерим диаграмму в модальном окне
            await renderDiagram(diagram.content, 'viewContent');
        } else {
            alert('Ошибка загрузки диаграммы');
        }
    } catch (error) {
        console.error('Error viewing diagram:', error);
        alert('Ошибка загрузки диаграммы');
    }
}

async function saveDiagram() {
    const id = document.getElementById('diagramId').value;
    const title = document.getElementById('title').value;
    const diagramType = document.getElementById('diagramType').value;
    const content = document.getElementById('content').value;
    const description = document.getElementById('description').value;

    if (!title || !content) {
        alert('Заполните название и код диаграммы');
        return;
    }

    const data = { title, diagram_type: diagramType, content, description };
    const url = id ? `/api/diagrams/${id}` : '/api/diagrams/';
    const method = id ? 'PUT' : 'POST';

    try {
        const response = await fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify(data)
        });

        if (response.ok) {
            bootstrap.Modal.getInstance(document.getElementById('diagramModal')).hide();
            resetDiagramForm();
            loadDiagrams();
            alert('Диаграмма сохранена!');
        } else {
            const error = await response.json();
            alert('Ошибка: ' + JSON.stringify(error));
        }
    } catch (error) {
        alert('Ошибка сохранения: ' + error.message);
    }
}

async function editDiagram(id) {
    try {
        const response = await fetch(`/api/diagrams/${id}`, { credentials: 'include' });
        if (response.ok) {
            const diagram = await response.json();
            document.getElementById('diagramId').value = diagram.id;
            document.getElementById('title').value = diagram.title;
            document.getElementById('diagramType').value = diagram.diagram_type;
            document.getElementById('content').value = diagram.content;
            document.getElementById('description').value = diagram.description || '';
            document.getElementById('modalTitle').textContent = 'Редактировать диаграмму';

            // Показываем предпросмотр
            await renderDiagram(diagram.content, 'preview');

            new bootstrap.Modal(document.getElementById('diagramModal')).show();
        }
    } catch (error) {
        alert('Ошибка загрузки диаграммы для редактирования');
    }
}

async function deleteDiagram(id) {
    if (confirm('Удалить диаграмму?')) {
        try {
            const response = await fetch(`/api/diagrams/${id}`, { method: 'DELETE', credentials: 'include' });
            if (response.ok) {
                loadDiagrams();
                alert('Диаграмма удалена!');
            } else {
                alert('Ошибка удаления');
            }
        } catch (error) {
            alert('Ошибка: ' + error.message);
        }
    }
}

function resetDiagramForm() {
    document.getElementById('diagramId').value = '';
    document.getElementById('title').value = '';
    document.getElementById('diagramType').value = 'mermaid';
    document.getElementById('content').value = '';
    document.getElementById('description').value = '';
    document.getElementById('preview').innerHTML = '<div class="diagram-preview-loading text-muted p-3"><i class="fas fa-info-circle"></i> Введите код диаграммы для предпросмотра</div>';
    document.getElementById('modalTitle').textContent = 'Создать диаграмму';
}

// Предпросмотр при изменении кода
let previewTimeout;
document.getElementById('content')?.addEventListener('input', function() {
    clearTimeout(previewTimeout);
    previewTimeout = setTimeout(async () => {
        const content = this.value;
        if (content && content.trim() !== '') {
            await renderDiagram(content, 'preview');
        } else {
            document.getElementById('preview').innerHTML = '<div class="diagram-preview-loading text-muted p-3"><i class="fas fa-info-circle"></i> Введите код диаграммы для предпросмотра</div>';
        }
    }, 500);
});

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Загрузка диаграмм при загрузке страницы
loadDiagrams();
</script>
{% endblock %}
