{% extends "base.html" %}

{% block title %}Мой профиль{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4>👤 Мой профиль</h4>
            </div>
            <div class="card-body">
                <p><strong>Имя пользователя:</strong> {{ user.preferred_username }}</p>
                <p><strong>Email:</strong> {{ user.email }}</p>
                <p><strong>ID:</strong> {{ user.sub }}</p>
                <hr>
                <a href="/ai-trainer" class="btn btn-primary">Начать тренировку</a>
                <a href="/knowledge-map" class="btn btn-info">Посмотреть карту знаний</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
